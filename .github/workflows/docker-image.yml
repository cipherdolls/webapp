name: Docker Image CI

on:
  push:
    branches: [ 'main', 'develop' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/webapp:${{ github.ref_name }},${{ secrets.DOCKER_HUB_USERNAME }}/webapp:${{ github.sha }}

      - name: docker stack deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: root
          host: ${{ secrets.SSH_KNOWN_HOSTS }}
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} 
            docker stack deploy -c ~/devops/hostinger/prod-stack.yaml prod --with-registry-auth
            docker stack deploy -c ~/devops/hostinger/dev-stack.yaml dev --with-registry-auth


      - name: Prune images on 77.37.51.42
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: root
          host: 77.37.51.42
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            docker image prune -a -f

      - name: Prune images on 195.35.25.26
        uses: appleboy/ssh-action@v1.0.3
        with:
          username: root
          host: 195.35.25.26
          key: ${{ secrets.SSH_PRIV_KEY }}
          script: |
            docker image prune -a -f

