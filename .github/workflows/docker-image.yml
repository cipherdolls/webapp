name: Docker Image CI

on:
  push:
    branches: [ 'main', 'develop' ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: webapp

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    timeout-minutes: 10
    
    steps:
      - name: Deploy to production servers
        uses: appleboy/ssh-action@v1.0.5
        with:
          username: root
          host: ${{ secrets.SSH_KNOWN_HOSTS }}
          key: ${{ secrets.SSH_PRIV_KEY }}
          timeout: 300s
          command_timeout: 10m
          script: |
            echo "🚀 Starting deployment..."
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
            
            echo "📦 Deploying production stack..."
            docker stack deploy -c ~/devops/hostinger/prod-stack.yaml prod --with-registry-auth
            
            echo "🔧 Deploying development stack..."
            docker stack deploy -c ~/devops/hostinger/dev-stack.yaml dev --with-registry-auth
            
            echo "✅ Deployment completed successfully"

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5
    
    strategy:
      matrix:
        server: ['77.37.51.42', '195.35.25.26']
    
    steps:
      - name: Cleanup images on ${{ matrix.server }}
        uses: appleboy/ssh-action@v1.0.5
        with:
          username: root
          host: ${{ matrix.server }}
          key: ${{ secrets.SSH_PRIV_KEY }}
          timeout: 300s
          script: |
            echo "🧹 Cleaning up unused images on ${{ matrix.server }}..."
            docker image prune -a -f
            echo "✅ Cleanup completed on ${{ matrix.server }}"


