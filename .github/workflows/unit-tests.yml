name: Unit Tests

on:
  pull_request:
    branches: [develop]  # Run on PRs from feature branches to develop

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run ESLint
        run: npx eslint app --ext .ts,.tsx --max-warnings 0

      - name: Run unit tests
        run: npm run test:unit

      - name: Start dev server
        run: npm run dev &
        
      - name: Wait for dev server
        run: |
          echo "Waiting for server to start..."
          timeout 120 bash -c 'until curl -f http://localhost:5173; do echo "Waiting..."; sleep 5; done'
          echo "Server is ready!"
          
      - name: Run browser compatibility tests
        run: npm run test:browser

  test-summary:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## Unit Test Results 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "### ✅ All Tests: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **94/94 Unit Tests** ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **TypeScript Checks** ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **ESLint** ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Browser Compatibility** ✅" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Ready for develop merge! 🚀" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Tests: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Fix issues before merging to develop" >> $GITHUB_STEP_SUMMARY
          fi