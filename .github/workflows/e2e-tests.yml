name: E2E Tests

on:
  pull_request:
    branches: [main, develop]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  test-metamask:
    needs: security-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Start development server
        run: npm run dev &

      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'

      - name: Build Synpress cache
        run: xvfb-run -a npm run test:cache

      - name: Run MetaMask tests
        run: xvfb-run -a npm run test:all-metamask

      - name: Format test results
        if: failure()
        run: |
          echo "## ❌ MetaMask Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Tests:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Extract only failed test names and errors
          grep -E "(✕|Error:|Expected:|Received:|at .*\.test\.ts)" test-results/results.txt 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-metamask
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  test-browser:
    needs: security-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Start development server
        run: npm run dev &

      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'

      - name: Run browser compatibility tests
        run: npm run test:browser

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-browser
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  test-summary:
    needs: [test-metamask, test-browser]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## Test Results 🧪" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.test-metamask.result }}" = "failure" ]; then
            echo "### ❌ MetaMask Tests: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Check the MetaMask test logs for details" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-metamask.result }}" = "success" ]; then
            echo "### ✅ MetaMask Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test-browser.result }}" = "failure" ]; then
            echo "### ❌ Browser Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test-browser.result }}" = "success" ]; then
            echo "### ✅ Browser Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 View detailed reports in the artifacts section" >> $GITHUB_STEP_SUMMARY